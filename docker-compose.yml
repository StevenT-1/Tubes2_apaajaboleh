services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tubes2-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tubes2-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
